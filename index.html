<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台股分析工具 - v2026-04-24 更新成功</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin:0; 
      background:#f8fafc; 
      padding:16px; 
    }
    .card { 
      background:white; 
      border-radius:16px; 
      box-shadow:0 4px 15px rgba(0,0,0,0.08); 
      padding:20px; 
      margin-bottom:20px; 
    }
    input, button { 
      width:100%; 
      padding:14px; 
      border-radius:12px; 
      border:1px solid #ddd; 
      font-size:16px; 
      margin-bottom:10px; 
    }
    button { 
      background:#4f46e5; 
      color:white; 
      border:none; 
      font-weight:600; 
    }
    .btn-green { background:#10b981; }
    .stock-tag { 
      background:#e5e7eb; 
      padding:8px 14px; 
      border-radius:9999px; 
      display:inline-flex; 
      align-items:center; 
      margin:4px 4px 4px 0; 
      font-size:15px; 
    }
    .result { 
      padding:30px; 
      text-align:center; 
      background:white; 
      border-radius:16px; 
      margin-top:20px; 
      font-size:16px; 
    }
  </style>
</head>
<body>
  <div style="max-width:1100px; margin:0 auto;">
    <!-- 明顯標題（方便確認更新） -->
    <h1 style="text-align:center; font-size:28px; margin:20px 0; color:#4f46e5;">
      📈 台股分析工具 - v2026-04-24 ✅ 更新成功
    </h1>

    <!-- Token -->
    <div class="card">
      <p style="margin:0 0 8px 0; font-weight:600;">FinMind Token</p>
      <input id="token-input" type="password" placeholder="貼上你的 Token">
      <button onclick="saveToken()">儲存 Token</button>
      <div id="token-status" style="margin-top:8px; font-size:14px; color:green;"></div>
    </div>

    <!-- 股票輸入 -->
    <div class="card">
      <p style="margin:0 0 8px 0; font-weight:600;">股票代碼</p>
      <div style="display:flex; gap:8px;">
        <input id="stock-input" type="text" placeholder="例如：2330">
        <button onclick="addStock()" class="btn-green" style="width:auto; padding:0 24px;">新增</button>
      </div>
      <div id="stock-list" style="margin-top:12px; min-height:50px;"></div>
    </div>

    <!-- 日期 -->
    <div class="card">
      <p style="margin:0 0 8px 0; font-weight:600;">資料區間（最多1年）</p>
      <input id="start-date" type="date">
      <input id="end-date" type="date" style="margin-top:8px;">
      <button onclick="fetchData()" style="margin-top:16px;">取得資料並分析</button>
    </div>

    <!-- 結果 -->
    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    let stocks = JSON.parse(localStorage.getItem('stocks')) || ['2330'];
    let token = localStorage.getItem('finmind_token') || '';

    function saveToken() {
      token = document.getElementById('token-input').value.trim();
      if (token) {
        localStorage.setItem('finmind_token', token);
        document.getElementById('token-status').innerHTML = '✅ Token 已儲存成功';
      } else {
        alert('請輸入 Token');
      }
    }

    function renderStocks() {
      const container = document.getElementById('stock-list');
      container.innerHTML = stocks.map((s, i) => `
        <span class="stock-tag">${s} 
          <span onclick="removeStock(${i}); event.stopImmediatePropagation()" style="margin-left:8px;color:red;cursor:pointer;">×</span>
        </span>
      `).join('');
    }

    function addStock() {
      const code = document.getElementById('stock-input').value.trim().toUpperCase();
      if (code && !stocks.includes(code)) {
        stocks.push(code);
        localStorage.setItem('stocks', JSON.stringify(stocks));
        renderStocks();
        document.getElementById('stock-input').value = '';
      }
    }

    function removeStock(i) {
      stocks.splice(i, 1);
      localStorage.setItem('stocks', JSON.stringify(stocks));
      renderStocks();
    }

    function setDefaultDates() {
      const end = new Date().toISOString().split('T')[0];
      const start = new Date();
      start.setFullYear(start.getFullYear() - 1);
      document.getElementById('end-date').value = end;
      document.getElementById('start-date').value = start.toISOString().split('T')[0];
    }

    async function fetchData() {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `<p>🔄 正在呼叫 FinMind API...</p>`;

      if (!token) {
        resultDiv.innerHTML = `<p style="color:red;">❌ 請先儲存 Token</p>`;
        return;
      }

      const start = document.getElementById('start-date').value;
      const end = document.getElementById('end-date').value;

      let output = `<p>✅ 已成功呼叫 API（v2026-04-24）</p><ul style="text-align:left; padding-left:20px;">`;

      for (let code of stocks) {
        try {
          const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start}&end_date=${end}`;
          const res = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
          const json = await res.json();
          
          if (json.data && json.data.length > 0) {
            const last = json.data[json.data.length-1];
            output += `<li><strong>${code}</strong>：${last.close} 元 (${last.date}) 漲跌 ${last.spread}</li>`;
          } else {
            output += `<li>${code}：無資料</li>`;
          }
        } catch(e) {
          output += `<li>${code}：連線失敗</li>`;
        }
      }
      output += `</ul>`;
      resultDiv.innerHTML = output;
    }

    window.onload = () => {
      renderStocks();
      setDefaultDates();
      if (token) document.getElementById('token-status').innerHTML = '✅ Token 已載入';
    };
  </script>
</body>
</html>
