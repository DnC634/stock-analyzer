<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股分析工具 - FinMind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .chart-container { height: 420px; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-5">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900">📈 台股分析工具</h1>
      <p class="text-gray-500 mt-1">使用 FinMind API • 多檔股票 • 技術分析</p>
    </div>

    <!-- Token 區塊 -->
    <div class="bg-white rounded-3xl shadow-md p-6 mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">FinMind Token</label>
      <div class="flex gap-3">
        <input id="token-input" type="password" placeholder="貼上你的 FinMind Token" 
               class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
        <button onclick="saveToken()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-medium">儲存 Token</button>
      </div>
      <div id="token-status" class="mt-3 text-sm"></div>
    </div>

    <!-- 控制區塊 -->
    <div class="bg-white rounded-3xl shadow-md p-6 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- 股票輸入 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">股票代碼（可多檔）</label>
          <div class="flex gap-3">
            <input id="stock-input" type="text" placeholder="例如 2330" 
                   class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
            <button onclick="addStock()" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 rounded-2xl font-medium">新增</button>
          </div>
          <div id="stock-list" class="flex flex-wrap gap-2 mt-4"></div>
        </div>

        <!-- 日期區間 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">資料時間區間</label>
          <div class="flex gap-4">
            <input id="start-date" type="date" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl">
            <input id="end-date" type="date" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl">
          </div>
          <button onclick="fetchAllStocks()" 
                  class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
            <i class="fas fa-sync"></i> 取得最新資料
          </button>
        </div>
      </div>
    </div>

    <!-- 股票卡片區域 -->
    <div id="stocks-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- 詳細圖表 -->
    <div id="detail-panel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-3xl max-w-5xl w-full max-h-[95vh] overflow-auto">
        <div class="p-6 border-b flex justify-between items-center sticky top-0 bg-white">
          <h2 id="detail-title" class="text-2xl font-bold"></h2>
          <button onclick="hideDetail()" class="text-4xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div class="p-6">
          <div id="price-chart" class="chart-container rounded-2xl mb-6"></div>
          <div id="analysis-result" class="bg-gray-50 p-6 rounded-2xl"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let stocks = JSON.parse(localStorage.getItem('stocks')) || ['2330'];
    let token = localStorage.getItem('finmind_token') || '';
    let chart = null;

    function saveToken() {
      token = document.getElementById('token-input').value.trim();
      if (token) {
        localStorage.setItem('finmind_token', token);
        document.getElementById('token-status').innerHTML = '<span class="text-green-600">✅ Token 已儲存成功</span>';
      } else {
        alert('請輸入 Token');
      }
    }

    function renderStockList() {
      const container = document.getElementById('stock-list');
      container.innerHTML = stocks.map((stock, index) => `
        <div class="inline-flex items-center bg-gray-100 px-4 py-2 rounded-2xl text-sm">
          ${stock}
          <button onclick="removeStock(${index}); event.stopImmediatePropagation()" class="ml-3 text-red-500 font-bold">×</button>
        </div>
      `).join('');
    }

    function addStock() {
      const input = document.getElementById('stock-input');
      let code = input.value.trim().toUpperCase();
      if (code && !stocks.includes(code)) {
        stocks.push(code);
        localStorage.setItem('stocks', JSON.stringify(stocks));
        renderStockList();
        input.value = '';
      }
    }

    function removeStock(index) {
      stocks.splice(index, 1);
      localStorage.setItem('stocks', JSON.stringify(stocks));
      renderStockList();
    }

    function setDefaultDates() {
      const today = new Date().toISOString().split('T')[0];
      const oneYearAgo = new Date();
      oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
      document
