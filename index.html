<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股分析工具 - FinMind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chart-container { height: 460px; background: #fafafa; border-radius: 16px; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center mb-2">📈 台股分析工具</h1>
    <p class="text-center text-gray-500 mb-8">FinMind API • 多檔股票 • 完整技術分析</p>

    <!-- Token -->
    <div class="bg-white rounded-3xl shadow p-6 mb-6">
      <label class="block text-sm font-medium mb-2">FinMind Token</label>
      <div class="flex gap-3">
        <input id="token-input" type="password" placeholder="貼上你的 Token" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500">
        <button onclick="saveToken()" class="bg-indigo-600 text-white px-8 rounded-2xl font-medium">儲存</button>
      </div>
      <div id="token-status" class="mt-3 text-sm"></div>
    </div>

    <!-- 股票與日期 -->
    <div class="bg-white rounded-3xl shadow p-6 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">股票代碼（可多檔）</label>
          <div class="flex gap-3">
            <input id="stock-input" type="text" placeholder="例如：2330" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500">
            <button onclick="addStock()" class="bg-emerald-600 text-white px-8 rounded-2xl font-medium">新增</button>
          </div>
          <div id="stock-list" class="flex flex-wrap gap-2 mt-4"></div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">資料時間區間（最多 1 年）</label>
          <div class="flex gap-4">
            <input id="start-date" type="date" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl">
            <input id="end-date" type="date" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl">
          </div>
          <button onclick="fetchAndAnalyze()" 
                  class="mt-6 w-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2">
            <i class="fas fa-sync"></i> 取得資料並分析
          </button>
        </div>
      </div>
    </div>

    <!-- 股票卡片 -->
    <div id="stocks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- 詳細分析面板 -->
    <div id="detail-panel" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-3xl w-full max-w-5xl max-h-[95vh] overflow-auto">
        <div class="sticky top-0 bg-white border-b p-6 flex justify-between items-center">
          <h2 id="detail-title" class="text-3xl font-bold"></h2>
          <button onclick="hideDetail()" class="text-4xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div class="p-6">
          <div id="price-chart" class="chart-container"></div>
          <div id="analysis-panel" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let stocks = JSON.parse(localStorage.getItem('stocks')) || ['2330'];
    let token = localStorage.getItem('finmind_token') || '';
    let currentData = {};
