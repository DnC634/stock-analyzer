<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股技術分析工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root { --bg:#080d16; --surface:#0f1724; --surface2:#162030; --border:#1a3358; --accent:#38bdf8; --accent2:#34d399; --text:#cbd5e1; --text-dim:#475569; --up:#34d399; --down:#f87171; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; max-width:640px; margin:0 auto; }
.header { text-align:center; padding:28px 0 20px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.header h1 { font-size:22px; font-weight:700; color:var(--accent); letter-spacing:2px; margin-bottom:6px; }
.header p { font-size:11px; color:var(--text-dim); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; }
.card-title { font-size:10px; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
textarea, input[type=text], input[type=date] { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; outline:none; -webkit-appearance:none; }
textarea { resize:none; height:72px; }
textarea:focus, input:focus { border-color:var(--accent); }
.date-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.input-group label { display:block; font-size:10px; color:var(--text-dim); margin-bottom:5px; }
input[type=date] { font-size:13px; }
.stock-tags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; min-height:32px; }
.tag { background:var(--surface2); border:1px solid var(--accent); border-radius:20px; padding:4px 10px; font-size:11px; color:var(--accent); display:flex; align-items:center; gap:6px; }
.tag .x { cursor:pointer; color:var(--text-dim); font-size:14px; }
.tag .x:hover { color:var(--down); }
.add-row { display:flex; gap:8px; }
.add-row input { font-size:14px; }
.btn { border:none; border-radius:10px; padding:11px 16px; font-family:'Noto Sans TC',sans-serif; font-weight:600; cursor:pointer; transition:all 0.15s; font-size:13px; }
.btn-add { background:var(--surface2); border:1px solid var(--accent2); color:var(--accent2); white-space:nowrap; }
.btn-run { width:100%; background:linear-gradient(135deg,#0369a1,#38bdf8); color:white; font-size:15px; font-weight:700; padding:15px; border-radius:12px; margin-bottom:14px; }
.btn-run:disabled { opacity:0.4; cursor:not-allowed; }
.btn-copy { width:100%; background:linear-gradient(135deg,#065f46,#34d399); color:white; font-size:15px; font-weight:700; padding:15px; border-radius:12px; }
.btn-copy:disabled { opacity:0.3; cursor:not-allowed; }
.progress-wrap { display:none; margin-bottom:8px; }
.progress-bar { width:100%; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.4s; width:0%; }
.log { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); line-height:1.9; min-height:36px; padding:6px 0; }
.ok { color:var(--up); } .err { color:var(--down); } .info { color:var(--accent); }
.results-wrap { display:none; }
.scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; font-size:11px; min-width:600px; }
th { background:var(--surface2); color:var(--accent); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:9px 10px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
th:first-child { text-align:left; }
td { padding:9px 10px; text-align:right; border-bottom:1px solid rgba(26,51,88,0.5); font-family:'JetBrains Mono',monospace; font-size:11px; white-space:nowrap; }
td:first-child { text-align:left; font-family:'Noto Sans TC',sans-serif; font-size:12px; }
tr:hover td { background:rgba(56,189,248,0.04); }
.up { color:var(--up); } .down { color:var(--down); } .flat { color:var(--text-dim); }
.dim { color:var(--text-dim); font-size:10px; font-style:italic; }
.err-row { color:var(--down); font-size:10px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:9px; font-weight:700; }
.bull { background:rgba(52,211,153,0.15); color:var(--up); border:1px solid rgba(52,211,153,0.3); }
.bear { background:rgba(248,113,113,0.15); color:var(--down); border:1px solid rgba(248,113,113,0.3); }
.mid { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
.output-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:'JetBrains Mono',monospace; font-size:10px; line-height:1.8; color:var(--text-dim); max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; margin-bottom:12px; }
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent2); color:#080d16; padding:11px 28px; border-radius:24px; font-weight:700; font-size:14px; transition:transform 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 台股技術分析</h1>
  <p>FinMind API · MA5/10/20/60 · RSI14 · Claude 格式</p>
</div>

<div class="card">
  <div class="card-title">🔑 FinMind Token</div>
  <textarea id="token" placeholder="貼上你的 FinMind JWT Token..."></textarea>
</div>

<div class="card">
  <div class="card-title">📅 查詢日期</div>
  <div class="date-row">
    <div class="input-group">
      <label>起始日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="input-group">
      <label>結束日期</label>
      <input type="date" id="endDate">
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">📋 股票清單</div>
  <div class="stock-tags" id="tags"></div>
  <div class="add-row">
    <input type="text" id="newStock" placeholder="輸入股票代碼" inputmode="numeric" maxlength="6">
    <button class="btn btn-add" onclick="addStock()">＋ 新增</button>
  </div>
</div>

<button class="btn btn-run" id="runBtn" onclick="run()">⚡ 開始抓取並計算</button>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
</div>
<div class="log" id="log"></div>

<div class="results-wrap" id="resultsWrap">
  <div class="card">
    <div class="card-title">📈 計算結果</div>
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>股票</th><th>收盤</th><th>漲跌%</th><th>MA5</th><th>MA10</th><th>MA20</th><th>MA60</th><th>RSI14</th><th>排列</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 複製給 Claude</div>
    <div class="output-box" id="outputBox">等待數據...</div>
    <button class="btn btn-copy" id="copyBtn" onclick="copyAll()">📋 一鍵複製 → 貼給 Claude</button>
  </div>
</div>

<div class="toast" id="toast">✅ 已複製！</div>

<script>
let stocks = [
  {id:'2330',name:'台積電'},{id:'3661',name:'世芯-KY'},{id:'1519',name:'華城'},
  {id:'6739',name:'竹陞科技'},{id:'8074',name:'鉅橡'},{id:'2344',name:'華邦電'},
  {id:'6515',name:'穎崴'},{id:'3498',name:'陽程'},{id:'5386',name:'青雲'},
  {id:'3221',name:'台嘉碩'},{id:'6465',name:'威潤'},
];
let results = {};

(function initDates() {
  const today = new Date();
  const start = new Date();
  start.setDate(today.getDate() - 110);
  function fmt(d) { return d.toISOString().split('T')[0]; }
  document.getElementById('endDate').value = fmt(today);
  document.getElementById('startDate').value = fmt(start);
})();

(function loadToken() {
  const saved = localStorage.getItem('finmind_token');
  if (saved) document.getElementById('token').value = saved;
})();
document.getElementById('token').addEventListener('blur', function() {
  if (this.value.trim()) localStorage.setItem('finmind_token', this.value.trim());
});

function renderTags() {
  document.getElementById('tags').innerHTML = stocks.map(s=>
    `<div class="tag"><span>${s.id}</span><span style="font-size:9px;opacity:0.6">${s.name}</span><span class="x" onclick="removeStock('${s.id}')">×</span></div>`
  ).join('');
}

function addStock() {
  const el = document.getElementById('newStock');
  const id = el.value.trim().replace(/\D/g,'');
  if (!id || id.length < 4) return;
  if (!stocks.find(s=>s.id===id)) stocks.push({id, name:id});
  el.value = '';
  renderTags();
}

function removeStock(id) {
  stocks = stocks.filter(s=>s.id!==id);
  renderTags();
}

document.getElementById('newStock').addEventListener('keydown', e => {
  if(e.key==='Enter') addStock();
});

let logLines = [];
function log(msg, cls='info') {
  logLines.push(`<span class="${cls}">${msg}</span>`);
  if(logLines.length > 10) logLines.shift();
  document.getElementById('log').innerHTML = logLines.join('<br>');
}

function setP(n, total) {
  document.getElementById('pFill').style.width = Math.round(n/total*100)+'%';
}

async function fetchStock(id, start, end, token) {
  const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${id}&start_date=${start}&end_date=${end}&token=${token}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status !== 200) throw new Error(json.msg || 'API 錯誤');
  if (!json.data || json.data.length === 0) throw new Error('無資料');
  return json.data;
}

function ma(arr, n) {
  if(arr.length < n) return null;
  const s = arr.slice(-n);
  return s.reduce((a,b)=>a+b,0)/n;
}

function rsi(arr, n=14) {
  if(arr.length < n+1) return null;
  const s = arr.slice(-(n+1));
  let g=0, l=0;
  for(let i=1;i<s.length;i++) {
    const d = s[i]-s[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  if(l===0) return 100;
  return 100-(100/(1+(g/n)/(l/n)));
}

function align(c, m5, m10, m20, m60) {
  const ms = [m5,m10,m20,m60].filter(v=>v!==null);
  if(ms.length<2) return 'mid';
  if(ms.every(m=>c>m) && ms[0]>ms[1]) return 'bull';
  if(ms.every(m=>c<m)) return 'bear';
  return 'mid';
}

async function run() {
  const token = document.getElementById('token').value.trim();
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  if(!token) { log('❌ 請先輸入 Token','err'); return; }
  if(!start||!end) { log('❌ 請設定日期','err'); return; }
  if(stocks.length===0) { log('❌ 請新增股票','err'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 抓取中...';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resultsWrap').style.display = 'block';
  logLines = [];
  results = {};

  document.getElementById('tbody').innerHTML = stocks.map(s=>
    `<tr id="r${s.id}"><td>${s.id}</td><td colspan="8" class="dim">載入中...</td></tr>`
  ).join('');
  document.getElementById('outputBox').textContent = '計算中...';

  for(let i=0;i<stocks.length;i++) {
    const s = stocks[i];
    setP(i, stocks.length);
    log(`📡 [${i+1}/${stocks.length}] ${s.id}`, 'info');

    try {
      const data = await fetchStock(s.id, start, end, token);
      const closes = data.map(d=>d.close);
      const last = data[data.length-1];
      const prev = data.length>=2 ? data[data.length-2].close : null;

      const m5 = ma(closes,5);
      const m10 = ma(closes,10);
      const m20 = ma(closes,20);
      const m60 = ma(closes,60);
      const r = rsi(closes,14);
      const chg = prev ? (last.close-prev)/prev*100 : null;
      const a = align(last.close, m5, m10, m20, m60);

      results[s.id] = {id:s.id, name:s.name, data, last, prev, m5, m10, m20, m60, rsi:r, chg, align:a};

      const cc = chg>0?'up':chg<0?'down':'flat';
      const cs = chg!==null ? `<span class="${cc}">${chg>0?'+':''}${chg.toFixed(2)}%</span>` : '-';
      const f = v => v!==null ? v.toFixed(1) : '<span class="dim">-</span>';
      const rc = r>=70?'down':r<=30?'up':'';
      const bdg = a==='bull' ? '<span class="badge bull">多頭</span>' : a==='bear' ? '<span class="badge bear">空頭</span>' : '<span class="badge mid">中性</span>';

      document.getElementById('r'+s.id).innerHTML = `<td>${s.id} ${s.name}</td><td class="${cc}">${last.close}</td><td>${cs}</td><td>${f(m5)}</td><td>${f(m10)}</td><td>${f(m20)}</td><td>${f(m60)}</td><td class="${rc}">${r!==null?r.toFixed(1):'-'}</td><td>${bdg}</td>`;

      log(`✅ ${s.id}`, 'ok');

    } catch(e) {
      log(`❌ ${s.id}: ${e.message}`, 'err');
      document.getElementById('r'+s.id).innerHTML = `<td>${s.id}</td><td colspan="8" class="err-row">❌ ${e.message}</td>`;
    }

    if(i < stocks.length-1) await new Promise(r=>setTimeout(r,300));
  }

  setP(stocks.length, stocks.length);
  const done = Object.keys(results).length;
  log(`🎉 完成！${done}/${stocks.length} 檔`, 'ok');
  btn.disabled = false;
  btn.textContent = '🔄 重新抓取';

  buildOutput(end);
}

function buildOutput(endDate) {
  const lines = [];
  lines.push(`===== 台股技術分析 ${endDate} 收盤 =====`);
  lines.push(`資料：FinMind API | 指標：MA5/10/20/60、RSI14`);
  lines.push(`────────────────────────────────────`);

  for(const id in results) {
    const r = results[id];
    const l = r.last;
    const chgStr = r.chg!==null ? `${r.chg>=0?'+':''}${r.chg.toFixed(2)}%` : 'N/A';
    const vol = Math.round(l.Trading_Volume/1000);

    lines.push(`\n【${id} ${r.name}】`);
    lines.push(`收盤:${l.close}  漲跌幅:${chgStr}  成交量:${vol}K`);
    lines.push(`開:${l.open}  高:${l.max}  低:${l.min}  昨收:${r.prev??'N/A'}`);
    lines.push(`MA5:${r.m5!==null?r.m5.toFixed(2):'N/A'}  MA10:${r.m10!==null?r.m10.toFixed(2):'N/A'}  MA20:${r.m20!==null?r.m20.toFixed(2):'N/A'}  MA60:${r.m60!==null?r.m60.toFixed(2):'N/A'}`);
    lines.push(`RSI14:${r.rsi!==null?r.rsi.toFixed(2):'N/A'}  排列:${r.align==='bull'?'多頭↑':r.align==='bear'?'空頭↓':'中性→'}`);

    const k5 = r.data.slice(-5).map(d=>`  ${d.date} O${d.open}H${d.max}L${d.min}C${d.close}V${Math.round(d.Trading_Volume/1000)}K`).join('\n');
    lines.push(`近5K:\n${k5}`);
  }

  lines.push(`\n────────────────────────────────────`);
  lines.push(`分析：趨勢型態、支撐壓力、操作建議`);

  document.getElementById('outputBox').textContent = lines.join('\n');
}

function copyAll() {
  const text = document.getElementById('outputBox').textContent;
  if(!text || text.includes('等待') || text.includes('計算中')) return;

  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showToast).catch(fallback);
  } else {
    fallback();
  }

  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

renderTags();
</script>
</body>
</html>
